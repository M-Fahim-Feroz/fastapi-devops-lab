name: FastAPI CI/CD Pipeline

# TODO: For production-grade supply-chain security, pin GitHub Actions to full commit SHAs instead of version tags.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build timestamp
        run: echo "Build started at $(date -u)"

  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install tools
        run: pip install flake8 bandit
      - name: flake8
        run: flake8 api --max-line-length=120
      - name: bandit
        run: bandit -r api -lll --exclude api/tests/

  test:
    name: Tests (Postgres + Redis + Celery)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    # Use hardcoded local credentials for CI service containers.
    # This keeps the test job functional for pull requests from forks
    # and avoids requiring POSTGRES_USER/PASSWORD/DB secrets for tests.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fastapi_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping || exit 1"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fastapi_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      WEATHER_API_KEY: test-key

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install test deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio psycopg2-binary
      - name: Start Celery worker (background)
        run: |
          nohup bash -c "celery -A api.tasks worker --loglevel=INFO" >/tmp/celery.log 2>&1 &
          sleep 5
          echo "Celery started. $(date -u)"
      - name: Run pytest
        run: |
          echo "Tests started at $(date -u)"
          pytest api/tests/tests.py -v --disable-warnings --maxfail=1
      - name: Show Celery logs on failure
        if: failure()
        run: |
          echo "---- Celery logs ----"
          tail -n 200 /tmp/celery.log || true

  docker:
    name: Build & Deploy Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build \
            -t fastapi-devsecops-pipeline:${{ github.sha }} \
            .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'fastapi-devsecops-pipeline:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      - name: Login to Docker Hub (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push images (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag fastapi-devsecops-pipeline:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-devsecops-pipeline:${{ github.sha }}
          docker tag fastapi-devsecops-pipeline:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-devsecops-pipeline:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-devsecops-pipeline:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-devsecops-pipeline:latest
